<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 120" width="880" height="120" shape-rendering="crispEdges">
  <rect width="880" height="120" fill="#0f0c29"/>

  <style>
    .w { animation: shift 1.8s steps(1, end) infinite; }
    @keyframes shift {
      0%   { transform: translateX(0px); }
      50%  { transform: translateX(-16px); }
      100% { transform: translateX(0px); }
    }
    .w2 { animation: shift2 2.4s steps(1, end) infinite; }
    @keyframes shift2 {
      0%   { transform: translateX(0px); }
      50%  { transform: translateX(16px); }
      100% { transform: translateX(0px); }
    }
  </style>

  <!-- Row 1 - wave tops (darkest blue) -->
  <g class="w" fill="#1a6b8a">
    <rect x="0"   y="56" width="16" height="16"/>
    <rect x="32"  y="48" width="16" height="16"/>
    <rect x="64"  y="40" width="16" height="16"/>
    <rect x="96"  y="48" width="16" height="16"/>
    <rect x="128" y="56" width="16" height="16"/>
    <rect x="160" y="48" width="16" height="16"/>
    <rect x="192" y="40" width="16" height="16"/>
    <rect x="224" y="48" width="16" height="16"/>
    <rect x="256" y="56" width="16" height="16"/>
    <rect x="288" y="48" width="16" height="16"/>
    <rect x="320" y="40" width="16" height="16"/>
    <rect x="352" y="48" width="16" height="16"/>
    <rect x="384" y="56" width="16" height="16"/>
    <rect x="416" y="48" width="16" height="16"/>
    <rect x="448" y="40" width="16" height="16"/>
    <rect x="480" y="48" width="16" height="16"/>
    <rect x="512" y="56" width="16" height="16"/>
    <rect x="544" y="48" width="16" height="16"/>
    <rect x="576" y="40" width="16" height="16"/>
    <rect x="608" y="48" width="16" height="16"/>
    <rect x="640" y="56" width="16" height="16"/>
    <rect x="672" y="48" width="16" height="16"/>
    <rect x="704" y="40" width="16" height="16"/>
    <rect x="736" y="48" width="16" height="16"/>
    <rect x="768" y="56" width="16" height="16"/>
    <rect x="800" y="48" width="16" height="16"/>
    <rect x="832" y="40" width="16" height="16"/>
    <rect x="864" y="48" width="16" height="16"/>
  </g>

  <!-- Row 2 - wave crests (mid blue) -->
  <g class="w2" fill="#0ea5c9">
    <rect x="16"  y="48" width="16" height="16"/>
    <rect x="48"  y="40" width="16" height="16"/>
    <rect x="80"  y="48" width="16" height="16"/>
    <rect x="112" y="56" width="16" height="16"/>
    <rect x="144" y="40" width="16" height="16"/>
    <rect x="176" y="48" width="16" height="16"/>
    <rect x="208" y="56" width="16" height="16"/>
    <rect x="240" y="40" width="16" height="16"/>
    <rect x="272" y="48" width="16" height="16"/>
    <rect x="304" y="56" width="16" height="16"/>
    <rect x="336" y="40" width="16" height="16"/>
    <rect x="368" y="48" width="16" height="16"/>
    <rect x="400" y="56" width="16" height="16"/>
    <rect x="432" y="40" width="16" height="16"/>
    <rect x="464" y="48" width="16" height="16"/>
    <rect x="496" y="56" width="16" height="16"/>
    <rect x="528" y="40" width="16" height="16"/>
    <rect x="560" y="48" width="16" height="16"/>
    <rect x="592" y="56" width="16" height="16"/>
    <rect x="624" y="40" width="16" height="16"/>
    <rect x="656" y="48" width="16" height="16"/>
    <rect x="688" y="56" width="16" height="16"/>
    <rect x="720" y="40" width="16" height="16"/>
    <rect x="752" y="48" width="16" height="16"/>
    <rect x="784" y="56" width="16" height="16"/>
    <rect x="816" y="40" width="16" height="16"/>
    <rect x="848" y="48" width="16" height="16"/>
  </g>

  <!-- Row 3 - wave body (solid ocean) -->
  <rect x="0" y="72" width="880" height="8"  fill="#1a6b8a"/>
  <rect x="0" y="80" width="880" height="8"  fill="#155e7a"/>
  <rect x="0" y="88" width="880" height="8"  fill="#0f4a61"/>
  <rect x="0" y="96" width="880" height="8"  fill="#0a3348"/>
  <rect x="0" y="104" width="880" height="8" fill="#06202e"/>
  <rect x="0" y="112" width="880" height="8" fill="#031219"/>

  <!-- white pixel foam on crests -->
  <g class="w" fill="#ffffff" opacity="0.6">
    <rect x="64"  y="40" width="8" height="4"/>
    <rect x="192" y="40" width="8" height="4"/>
    <rect x="320" y="40" width="8" height="4"/>
    <rect x="448" y="40" width="8" height="4"/>
    <rect x="576" y="40" width="8" height="4"/>
    <rect x="704" y="40" width="8" height="4"/>
    <rect x="832" y="40" width="8" height="4"/>
  </g>
</svg>
