<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03045E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#03045E" />

  <!-- Subtle background grid lines -->
  <g stroke="#0077B6" stroke-width="0.3" opacity="0.15">
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="650" y1="0" x2="650" y2="300" />
  </g>

  <!-- ===== LEFT: 8-pointed star at (150, 150), CW 20s ===== -->
  <g transform="translate(150,150)">
    <!-- Outer ring: 8 kite petals + 8-star polygon, CW 20s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(45)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(90)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(135)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(180)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(225)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(270)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(315)" />
      <polygon points="0,-45 7.3,-17.6 31.8,-31.8 17.6,-7.3 45,0 17.6,7.3 31.8,31.8 7.3,17.6 0,45 -7.3,17.6 -31.8,31.8 -17.6,7.3 -45,0 -17.6,-7.3 -31.8,-31.8 -7.3,-17.6" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.8" />
      <polygon points="0,-45 7.3,-17.6 31.8,-31.8 17.6,-7.3 45,0 17.6,7.3 31.8,31.8 7.3,17.6 0,45 -7.3,17.6 -31.8,31.8 -17.6,7.3 -45,0 -17.6,-7.3 -31.8,-31.8 -7.3,-17.6" fill="none" stroke="#0077B6" stroke-width="0.7" opacity="0.5" transform="rotate(22.5)" />
    </g>
    <!-- Mid ring: 8 triangles at 22.5° offset, CCW 13s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="13s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(22.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(67.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(112.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(157.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(202.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(247.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(292.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(337.5)" />
    </g>
    <!-- Inner two squares, slow CW 40s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="40s" repeatCount="indefinite" additive="sum" />
      <rect x="-28" y="-28" width="56" height="56" fill="#0077B6" opacity="0.25" />
      <rect x="-28" y="-28" width="56" height="56" fill="#00B4D8" opacity="0.15" transform="rotate(45)" />
    </g>
    <!-- Center circles -->
    <circle r="18" fill="#03045E" stroke="#00B4D8" stroke-width="1.5" opacity="0.95" />
    <circle r="14" fill="#03045E" stroke="#0077B6" stroke-width="0.8" opacity="0.6" />
  </g>

  <!-- ===== CENTER: 12-pointed star at (400, 150), CW 30s ===== -->
  <g transform="translate(400,150)">
    <!-- Outer ring: 12 kite petals + 12-star polygon, CW 30s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="30s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(30)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(60)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(90)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(120)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(150)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(180)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(210)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(240)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(270)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(300)" />
      <polygon points="0,-75 7,-58 0,-43 -7,-58" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(330)" />
      <polygon points="0,-52 5.2,-19.3 26,-45 14.1,-14.1 45,-26 19.3,-5.2 52,0 19.3,5.2 45,26 14.1,14.1 26,45 5.2,19.3 0,52 -5.2,19.3 -26,45 -14.1,14.1 -45,26 -19.3,5.2 -52,0 -19.3,-5.2 -45,-26 -14.1,-14.1 -26,-45 -5.2,-19.3" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.8" />
      <polygon points="0,-52 5.2,-19.3 26,-45 14.1,-14.1 45,-26 19.3,-5.2 52,0 19.3,5.2 45,26 14.1,14.1 26,45 5.2,19.3 0,52 -5.2,19.3 -26,45 -14.1,14.1 -45,26 -19.3,5.2 -52,0 -19.3,-5.2 -45,-26 -14.1,-14.1 -26,-45 -5.2,-19.3" fill="none" stroke="#0077B6" stroke-width="0.7" opacity="0.5" transform="rotate(15)" />
    </g>
    <!-- Mid ring: 12 triangles at 15° offset, CCW 20s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="20s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(15)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(45)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(75)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(105)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(135)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(165)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(195)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(225)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(255)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(285)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(315)" />
      <polygon points="0,-63 7,-49 -7,-49" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(345)" />
    </g>
    <!-- Inner three squares (0°/30°/60°), slow CW 60s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="60s" repeatCount="indefinite" additive="sum" />
      <rect x="-30" y="-30" width="60" height="60" fill="#0077B6" opacity="0.2" />
      <rect x="-30" y="-30" width="60" height="60" fill="#00B4D8" opacity="0.13" transform="rotate(30)" />
      <rect x="-30" y="-30" width="60" height="60" fill="#90E0EF" opacity="0.08" transform="rotate(60)" />
    </g>
    <!-- Center circles -->
    <circle r="20" fill="#03045E" stroke="#00B4D8" stroke-width="1.5" opacity="0.95" />
    <circle r="16" fill="#03045E" stroke="#0077B6" stroke-width="0.8" opacity="0.6" />
  </g>

  <!-- ===== RIGHT: 8-pointed star at (650, 150), CCW 25s ===== -->
  <g transform="translate(650,150)">
    <!-- Outer ring: 8 kite petals + 8-star polygon, CCW 25s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="25s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(45)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(90)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(135)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(180)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(225)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(270)" />
      <polygon points="0,-70 8,-55 0,-40 -8,-55" fill="url(#oceanGrad)" opacity="0.85" filter="url(#glow)" transform="rotate(315)" />
      <polygon points="0,-45 7.3,-17.6 31.8,-31.8 17.6,-7.3 45,0 17.6,7.3 31.8,31.8 7.3,17.6 0,45 -7.3,17.6 -31.8,31.8 -17.6,7.3 -45,0 -17.6,-7.3 -31.8,-31.8 -7.3,-17.6" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.8" />
      <polygon points="0,-45 7.3,-17.6 31.8,-31.8 17.6,-7.3 45,0 17.6,7.3 31.8,31.8 7.3,17.6 0,45 -7.3,17.6 -31.8,31.8 -17.6,7.3 -45,0 -17.6,-7.3 -31.8,-31.8 -7.3,-17.6" fill="none" stroke="#0077B6" stroke-width="0.7" opacity="0.5" transform="rotate(22.5)" />
    </g>
    <!-- Mid ring: 8 triangles at 22.5° offset, CW 17s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="17s" repeatCount="indefinite" additive="sum" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(22.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(67.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(112.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(157.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(202.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(247.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(292.5)" />
      <polygon points="0,-60 8,-45 -8,-45" fill="#00B4D8" opacity="0.6" filter="url(#glow)" transform="rotate(337.5)" />
    </g>
    <!-- Inner two squares, slow CCW 50s -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="50s" repeatCount="indefinite" additive="sum" />
      <rect x="-28" y="-28" width="56" height="56" fill="#0077B6" opacity="0.25" />
      <rect x="-28" y="-28" width="56" height="56" fill="#00B4D8" opacity="0.15" transform="rotate(45)" />
    </g>
    <!-- Center circles -->
    <circle r="18" fill="#03045E" stroke="#00B4D8" stroke-width="1.5" opacity="0.95" />
    <circle r="14" fill="#03045E" stroke="#0077B6" stroke-width="0.8" opacity="0.6" />
  </g>

  <!-- Girih connector lines -->
  <!-- Left connector (between left cluster and center) -->
  <line x1="222" y1="150" x2="322" y2="150" stroke="url(#oceanGrad)" stroke-width="1" opacity="0.5" />
  <line x1="222" y1="145" x2="295" y2="145" stroke="#00B4D8" stroke-width="0.5" opacity="0.25" />
  <line x1="222" y1="155" x2="295" y2="155" stroke="#00B4D8" stroke-width="0.5" opacity="0.25" />
  <polygon points="262,150 272,143 282,150 272,157" fill="#00B4D8" opacity="0.7" />

  <!-- Right connector (between center and right cluster) -->
  <line x1="478" y1="150" x2="578" y2="150" stroke="url(#oceanGrad)" stroke-width="1" opacity="0.5" />
  <line x1="505" y1="145" x2="578" y2="145" stroke="#00B4D8" stroke-width="0.5" opacity="0.25" />
  <line x1="505" y1="155" x2="578" y2="155" stroke="#00B4D8" stroke-width="0.5" opacity="0.25" />
  <polygon points="518,150 528,143 538,150 528,157" fill="#00B4D8" opacity="0.7" />

  <!-- Corner ornamental stars (static) -->
  <g transform="translate(40,40)">
    <polygon points="0,-14 3,-5 13,-5 5,2 8,12 0,6 -8,12 -5,2 -13,-5 -3,-5" fill="#0077B6" opacity="0.6" filter="url(#glow)" />
  </g>
  <g transform="translate(760,40)">
    <polygon points="0,-14 3,-5 13,-5 5,2 8,12 0,6 -8,12 -5,2 -13,-5 -3,-5" fill="#0077B6" opacity="0.6" filter="url(#glow)" />
  </g>
  <g transform="translate(40,260)">
    <polygon points="0,-14 3,-5 13,-5 5,2 8,12 0,6 -8,12 -5,2 -13,-5 -3,-5" fill="#0077B6" opacity="0.6" filter="url(#glow)" />
  </g>
  <g transform="translate(760,260)">
    <polygon points="0,-14 3,-5 13,-5 5,2 8,12 0,6 -8,12 -5,2 -13,-5 -3,-5" fill="#0077B6" opacity="0.6" filter="url(#glow)" />
  </g>

</svg>
